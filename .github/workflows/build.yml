name: Build

on:
  push:
    tags: ["v*"]
  pull_request: # build + test the matrix on PRs; the release step stays tag-gated
  workflow_dispatch:

permissions:
  contents: write # create releases

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            artifact: RCCentral-windows-x64.exe
            out: dist/RCCentral.exe
          - runner: windows-11-arm
            artifact: RCCentral-windows-arm64.exe
            out: dist/RCCentral.exe
          - runner: ubuntu-latest
            artifact: RCCentral-linux-x64
            out: dist/RCCentral
    defaults:
      run:
        shell: bash # Git Bash on Windows, so mv/pytest run the same everywhere
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv sync
      - run: uv run ruff check .
      # PySide6 links libEGL even under the offscreen QPA plugin the tests use,
      # and headless Ubuntu runners don't ship it.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest
      - run: uv run pyinstaller RCCentral.spec
      - run: mv "${{ matrix.out }}" "${{ matrix.artifact }}"
      - run: sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
      # Sign the release binary with the Ed25519 update key so the app can verify its
      # provenance before self-updating. Tag builds only: the secret isn't exposed to
      # PR builds, and PR artifacts aren't distributed via the updater anyway.
      - if: startsWith(github.ref, 'refs/tags/')
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: uv run python scripts/sign_release.py "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            ${{ matrix.artifact }}.sig
