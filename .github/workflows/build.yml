name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
      - run: uv run pyinstaller --onefile --windowed --name RCCentral --paths . --icon app/assets/icon.ico --add-data "catalog;catalog" --add-data "app/assets;app/assets" app/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: RCCentral
          path: dist/RCCentral.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/RCCentral.exe
