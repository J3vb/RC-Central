name: Validate catalog

on:
  pull_request:
    paths: ["catalog/**", "scripts/**"]
  schedule:
    - cron: "17 4 * * *" # nightly link-rot check
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --no-project --with jsonschema --with requests python scripts/validate_catalog.py --check-urls
